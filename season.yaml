# ============================================================================
# PER-SEASON CONFIG
# Copy this to season.yaml and edit it once the cast is announced.
# This is the ONLY file you need to change between seasons.
# ============================================================================

season_number: 28
season_name: "Big Brother 28"

# Used to compute "Day N" and the current game week. Set to premiere date.
season_start_date: "2026-07-09"

# Big Brother counts Day 1 from MOVE-IN, not premiere night — the feeds were
# saying "Day 5" while the bot said "Day 3". Weeks still run from the premiere.
house_day_one: "2026-07-07"

# Live-feed updates RSS feed (Jokers Updates).
rss_url: "https://rss.jokersupdates.com/ubbthreads/rss/bbusaupdates/rss.php"

# Jokers is polled every 10 minutes, NOT every 2. The feed holds ~70 items and
# the house produces an update every 2-3 min at peak, so there is over two hours
# of buffer — a 10-minute poll loses nothing, while cutting requests from ~720 to
# ~144/day. The old rate was almost certainly what tripped their datacenter-IP
# blocks. Bluesky still polls every 2 minutes, so breaking news is unaffected.
rss_poll_interval_s: 600

# Tried in order if the primary refuses the connection. The rss.* host has been
# seen to drop TCP connections from Railway while the site itself is up.
# NOTE: rss./forums./www.jokersupdates.com all resolve to the SAME IP
# (169.61.62.206), so alternate hostnames are NOT redundancy — when that host
# blocks datacenter traffic, every one of them fails identically. Left empty.
rss_fallback_urls: []

# Jokers refuses TCP connections from cloud IPs (verified: the feed returns 200
# from a home connection, and "Connect call failed" from Railway). These proxies
# fetch the feed from their OWN address and return the raw XML. Tried only AFTER
# a direct fetch fails, so if Jokers ever unblocks us the bot goes straight back
# to the source. {url} is replaced with the URL-encoded feed address.
rss_proxy_templates:
  - "https://api.allorigins.win/raw?url={url}"
  - "https://api.codetabs.com/v1/proxy/?quest={url}"
  - "https://corsproxy.io/?url={url}"
  - "https://api.cors.lol/?url={url}"
  # r.jina.ai takes the target URL appended RAW — percent-encoding it returns 422.
  - "https://r.jina.ai/{url_raw}"
  # (thingproxy.freeboard.io removed: the host no longer resolves.)

# A genuinely INDEPENDENT source — different site, different host, different IP.
# Jokers is richer and more granular, but its server intermittently refuses
# datacenter traffic; when that happens this keeps real house updates flowing.
# OnlineBigBrother posts fewer, longer items with near-transcript dialogue,
# which is excellent for alliance/relationship extraction.
extra_rss_feeds:
  - name: "onlinebb"
    url: "https://www.onlinebigbrother.com/feed/"

